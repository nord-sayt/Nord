<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>آدرس IP شما</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 1.2rem;
      color: #94a3b8;
      font-weight: 400;
      margin-bottom: 24px;
    }
    .ip-display {
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 10px;
      padding: 20px 32px;
      font-size: 1.8rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      color: #38bdf8;
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .loading {
      color: #64748b;
      font-size: 1rem;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .copy-btn {
      margin-top: 20px;
      background: #0ea5e9;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 28px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
      display: none;
    }
    .copy-btn:hover { background: #0284c7; }
    .copied { background: #22c55e !important; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌐</div>
    <h1>آدرس IP شما</h1>
    <div class="ip-display">
      <span class="loading" id="ip-text">در حال دریافت...</span>
    </div>
    <button class="copy-btn" id="copy-btn" onclick="copyIP()">کپی کردن</button>
  </div>

  <script>
    let ipValue = '';

    fetch('/api/get-ip')
      .then(r => r.json())
      .then(data => {
        ipValue = data.ip || 'نامشخص';
        const el = document.getElementById('ip-text');
        el.textContent = ipValue;
        el.classList.remove('loading');
        document.getElementById('copy-btn').style.display = 'inline-block';
      })
      .catch(() => {
        document.getElementById('ip-text').textContent = 'خطا در دریافت';
      });

    function copyIP() {
      navigator.clipboard.writeText(ipValue).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'کپی شد!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'کپی کردن';
          btn.classList.remove('copied');
        }, 2000);
      });
    }
  </script>
</body>
</html>
