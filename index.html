<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NORD PRO MAX</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="logo">NORD</div>

<nav>
<a href="#home">خانه</a>
<a href="#login">ورود</a>
<a href="#server">سرور</a>
<a href="#rules">قوانین</a>
</nav>
</header>

<section class="hero" id="home">
<h1>NORD</h1>
<p>Ultimate Minecraft Server</p>
</section>

<section class="section" id="login">
<h2>👤 ورود / ثبت نام</h2>

<div class="card">

<input id="user" placeholder="نام کاربری">
<input id="pass" type="password" placeholder="رمز">

<button class="btn" onclick="register()">ثبت نام</button>
<button class="btn2" onclick="login()">ورود</button>

<p id="msg"></p>

</div>
</section>

<section class="section" id="server">
<h2>🎮 سرور</h2>

<div class="card">

<h3>IP:</h3>
<p id="ip">nord-mc.net</p>

<button class="btn" onclick="copyIP()">کپی IP</button>

</div>
</section>

<section class="section" id="rules">
<h2>📜 قوانین</h2>

<div class="rules">
<div class="rule">❌ چیت ممنوع</div>
<div class="rule">🤝 احترام اجباری</div>
<div class="rule">🚫 اسپم ممنوع</div>
<div class="rule">🎮 بازی منصفانه</div>
</div>

</section>

<footer>
© NORD PRO MAX
</footer>

<script>

function register(){
localStorage.setItem("u_"+user.value, pass.value);
msg.innerText="ثبت شد ✔";
}

function login(){
if(localStorage.getItem("u_"+user.value) === pass.value){
msg.innerText="خوش آمدی";
}else{
msg.innerText="❌ اشتباه";
}
}

function copyIP(){
navigator.clipboard.writeText(ip.innerText);
alert("کپی شد");
}

</script>

</body>
</html>
