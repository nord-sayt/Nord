<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NORD SERVER HUB</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#05070f;
color:white;
overflow-x:hidden;
}

/* 🌌 background glow */
body::before{
content:"";
position:fixed;
width:700px;
height:700px;
background:radial-gradient(circle,#00e5ff33,#0000 70%);
top:-200px;
left:-200px;
filter:blur(80px);
animation:move 10s infinite alternate;
}

@keyframes move{
from{transform:translate(0,0);}
to{transform:translate(200px,100px);}
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:rgba(11,16,32,0.9);
backdrop-filter:blur(10px);
position:sticky;
top:0;
border-bottom:1px solid #1b2a44;
z-index:10;
}

.logo{
color:#00e5ff;
font-weight:bold;
font-size:18px;
}

nav a{
color:#aaa;
margin:0 8px;
text-decoration:none;
transition:.3s;
}

nav a:hover{
color:#00e5ff;
}

/* SECTION */
section{
padding:30px;
}

/* SERVER BOX */
.panel{
background:#0b1020;
padding:20px;
border-radius:12px;
border:1px solid #1b2a44;
animation:float 6s ease-in-out infinite;
}

.btn{
display:inline-block;
margin-top:10px;
padding:10px 15px;
background:#00e5ff;
color:black;
border-radius:8px;
text-decoration:none;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

/* CARD FLOAT */
.card{
background:#0b1020;
padding:15px;
border-radius:12px;
border:1px solid #1b2a44;
animation:float 6s ease-in-out infinite;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
border-color:#00e5ff;
}

/* BOX */
.box{
margin-top:20px;
padding:20px;
background:#0b1020;
border-radius:12px;
border:1px solid #1b2a44;
}

/* INPUT */
input{
width:90%;
padding:10px;
border-radius:8px;
border:none;
margin-top:10px;
}

/* TICKET */
.ticket{
margin-top:10px;
padding:10px;
border:1px solid #1b2a44;
border-radius:8px;
background:#070b18;
}

/* FLOAT ANIMATION */
@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

/* FOOTER */
footer{
text-align:center;
padding:15px;
color:#777;
border-top:1px solid #1b2a44;
margin-top:30px;
}
</style>

</head>

<body>

<!-- HEADER -->
<header>
<div class="logo">⚡ NORD SERVER</div>

<nav>
<a href="#server">سرور</a>
<a href="#downloads">دانلود</a>
<a href="#search">جستجو</a>
<a href="#support">پشتیبانی</a>
<a href="#admin">ادمین</a>
</nav>
</header>

<!-- SERVER -->
<section id="server">
<h2>Server</h2>

<div class="panel">
<p>IP: play.nord.ir</p>
<p>Version: 1.21</p>
<p>Status: 🟢 Online</p>
<a class="btn">Copy IP</a>
</div>
</section>

<!-- DOWNLOADS -->
<section id="downloads">
<h2>Downloads</h2>

<div class="container">

<div class="card">
<p>Resource Pack</p>
<a class="btn">Download</a>
</div>

<div class="card">
<p>FPS Booster</p>
<a class="btn">Download</a>
</div>

<div class="card">
<p>Shader Pack</p>
<a class="btn">Download</a>
</div>

</div>
</section>

<!-- SEARCH -->
<section id="search">
<h2>Search</h2>

<div class="box">
<input type="text" placeholder="Search Nord...">
</div>
</section>

<!-- SUPPORT -->
<section id="support">
<h2>Support (Bale)</h2>

<div class="box">
<p>پشتیبانی فقط از طریق بله</p>
<a class="btn" href="https://ble.ir/USERNAME">Bale Support</a>
</div>
</section>

<!-- ADMIN PANEL -->
<section id="admin">
<h2>Admin Panel</h2>

<div class="box">

<div id="tickets"></div>

</div>
</section>

<!-- SCRIPT -->
<script>
let tickets = JSON.parse(localStorage.getItem("tickets") || "[]");

let box = document.getElementById("tickets");

tickets.forEach(t=>{
box.innerHTML += `
<div class="ticket">
<b>${t.name}</b><br>
${t.msg}<br>
<small>${t.contact}</small>
</div>
`;
});
</script>

<!-- FOOTER -->
<footer>
© 2026 NORD SERVER HUB
</footer>

</body>
</html>
