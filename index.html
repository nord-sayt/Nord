<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Nord Server</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>⚡ Nord Server Panel</h1>

  <nav>
    <button onclick="show('home')">خانه</button>
    <button onclick="show('download')">دانلود</button>
    <button onclick="show('team')">تیم</button>
    <button onclick="show('support')">پشتیبانی</button>
    <button onclick="show('owner')">اونر</button>
  </nav>
</header>

<!-- HOME -->
<section id="home">
  <h2>📢 تبلیغ سرور</h2>

  <div class="card">
    <p>🎮 IP: <span id="ip">Not Set</span></p>
    <p>📢 بله: <span id="bale">Not Set</span></p>
    <p>👑 Owner: mohammadamin</p>
  </div>

  <div id="announcements"></div>
</section>

<!-- DOWNLOAD -->
<section id="download" class="hidden">
  <h2>📦 دانلودها</h2>

  <div id="downloadList"></div>
</section>

<!-- TEAM -->
<section id="team" class="hidden">
  <h2>👥 تیم Nord</h2>

  <div class="card">
    👑 Owner: <b>mohammadamin</b>
  </div>

  <div id="teamList"></div>
</section>

<!-- SUPPORT -->
<section id="support" class="hidden">
  <h2>🛠 پشتیبانی</h2>

  <div class="card">
    📩 تلگرام: @minecraft_nord
  </div>
</section>

<!-- OWNER -->
<section id="owner" class="hidden">
  <h2>👑 پنل اونر</h2>

  <textarea id="annText" placeholder="اعلامیه"></textarea>
  <button onclick="addAnn()">ثبت اعلامیه</button>

  <input id="ipInput" placeholder="IP سرور">
  <input id="baleInput" placeholder="کانال بله">
  <button onclick="saveSettings()">ذخیره</button>

  <h3>👥 تیم (5 نفر)</h3>
  <input id="t1"><input id="t2"><input id="t3"><input id="t4"><input id="t5">
  <button onclick="saveTeam()">ذخیره تیم</button>

  <h3>📦 افزودن دانلود</h3>
  <input id="dTitle" placeholder="اسم فایل">
  <input id="dDesc" placeholder="توضیح">
  <input id="dLink" placeholder="لینک دانلود">
  <button onclick="addDownload()">افزودن فایل</button>
</section>

<script src="app.js"></script>
</body>
</html>
