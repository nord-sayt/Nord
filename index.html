<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NORD SERVER HUB</title>

<style>
body{
margin:0;
font-family:Vazirmatn, tahoma;
background:#05070f;
color:white;
overflow-x:hidden;
}

/* glow */
body::before{
content:"";
position:fixed;
width:800px;
height:800px;
background:radial-gradient(circle,#00e5ff33,#0000 70%);
top:-200px;
left:-200px;
filter:blur(80px);
animation:bgMove 12s infinite alternate;
}

@keyframes bgMove{
from{transform:translate(0,0);}
to{transform:translate(200px,120px);}
}

/* HEADER (بدون سرچ بالا طبق خواسته تو) */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
position:sticky;
top:0;
z-index:10;
background:rgba(10,15,30,0.6);
backdrop-filter:blur(14px);
border-bottom:1px solid #1b2a44;
}

/* LOGO */
.logo-box{
display:flex;
align-items:center;
gap:10px;
}

.logo-icon{
width:44px;
height:44px;
border-radius:50%;
background:linear-gradient(135deg,#00e5ff,#0066ff);
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
color:black;
box-shadow:0 0 25px #00e5ff55;
animation:pulse 2s infinite;
}

.logo-text{
font-weight:800;
color:#00e5ff;
letter-spacing:2px;
}

/* NAV */
nav a{
color:#aaa;
margin:0 10px;
text-decoration:none;
transition:.3s;
}

nav a:hover{
color:#00e5ff;
}

/* HERO */
.hero{
text-align:center;
padding:80px 20px 30px;
}

.hero h1{
font-size:55px;
color:#00e5ff;
text-shadow:0 0 25px #00e5ff55;
}

.panel{
margin:20px auto;
max-width:420px;
padding:25px;
border-radius:18px;
background:rgba(20,25,40,0.6);
border:1px solid #1b2a44;
animation:float 6s ease-in-out infinite;
}

/* BUTTONS (شناورتر) */
.btn, .download{
display:inline-block;
margin-top:12px;
padding:12px 20px;
background:linear-gradient(135deg,#00e5ff,#0066ff);
color:black;
font-weight:700;
border-radius:12px;
text-decoration:none;
transition:.3s;
position:relative;
overflow:hidden;
}

.btn:hover, .download:hover{
transform:translateY(-6px) scale(1.06);
box-shadow:0 0 25px #00e5ff55;
}

/* floating cards */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:30px;
}

.card{
background:rgba(20,25,40,0.6);
border:1px solid #1b2a44;
border-radius:16px;
padding:20px;
animation:float 6s ease-in-out infinite;
transition:.3s;
}

.card:hover{
transform:translateY(-12px) scale(1.03);
border-color:#00e5ff;
}

/* SEARCH (داخل دانلود) */
.search-box{
display:flex;
align-items:center;
gap:10px;
background:#0b1020;
padding:12px;
border-radius:12px;
border:1px solid #1b2a44;
margin:20px 30px 10px;
}

.search-box span{
color:#00e5ff;
font-size:18px;
}

.search-box input{
flex:1;
border:none;
outline:none;
background:transparent;
color:white;
}

/* SUPPORT */
.box{
margin:40px;
padding:25px;
background:rgba(20,25,40,0.6);
border-radius:16px;
border:1px solid #1b2a44;
text-align:center;
}

/* TICKET */
.ticket{
margin-top:10px;
padding:10px;
border:1px solid #1b2a44;
border-radius:10px;
background:#0b1020;
}

/* FLOAT */
@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

footer{
text-align:center;
padding:20px;
color:#777;
border-top:1px solid #1b2a44;
margin-top:40px;
}
</style>

</head>

<body>

<header>

<div class="logo-box">
<div class="logo-icon">N</div>
<div class="logo-text">NORD SERVER</div>
</div>

<nav>
<a href="#server">سرور</a>
<a href="#downloads">دانلود</a>
<a href="#support">پشتیبانی</a>
</nav>

</header>

<section class="hero">

<h1>NORD SERVER</h1>

<div class="panel">
<p>IP: در حال ساخت...</p>
<p>Version: 1.18.2</p>
<p>Status: 🔴 Offline</p>
</div>

</section>

<!-- DOWNLOAD + SEARCH -->
<section id="downloads">

<h2 style="padding:0 30px;">Downloads</h2>

<div class="search-box">
<span>🔍</span>
<input id="searchInput" type="text" placeholder="جستجو در دانلودها...">
</div>

<div class="container">

<div class="card">
<h3>Resource Pack</h3>
<a class="download">Download</a>
</div>

<div class="card">
<h3>FPS Booster</h3>
<a class="download">Download</a>
</div>

<div class="card">
<h3>Shader Pack</h3>
<a class="download">Download</a>
</div>

</div>

</section>

<!-- SUPPORT -->
<section id="support" class="box">

<h2>Support</h2>

<a class="btn" href="https://ble.ir/@ma_shahripour" target="_blank">
💬 ارتباط در بله
</a>

</section>

<footer>
© 2026 NORD SERVER HUB
</footer>

<script>
// 🔍 REAL SEARCH
const input = document.getElementById("searchInput");
const cards = document.querySelectorAll(".card");

input.addEventListener("input", () => {
let value = input.value.toLowerCase();

cards.forEach(card => {
let text = card.innerText.toLowerCase();

card.style.display = text.includes(value) ? "block" : "none";
});
});
</script>

</body>
</html>
