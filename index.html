<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NORD SERVER HUB</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#05070f;
color:white;
overflow:hidden;
}

/* 🌌 LOADING */
#loader{
position:fixed;
width:100%;
height:100%;
background:#05070f;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}

.spinner{
width:55px;
height:55px;
border:4px solid #1b2a44;
border-top:4px solid #00e5ff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* 🌌 PARTICLES */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
background:rgba(10,15,30,0.7);
backdrop-filter:blur(15px);
border-bottom:1px solid #1b2a44;
}

.logo-box{
display:flex;
align-items:center;
gap:10px;
}

.logo-icon{
width:44px;
height:44px;
border-radius:50%;
background:linear-gradient(135deg,#ff2b2b,#8b0000);
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
color:white;
box-shadow:0 0 18px #ff2b2b88;
}

.logo-text{
color:#00e5ff;
font-weight:800;
}

/* SECTIONS */
section{
padding:25px;
}

.panel,.box,.card{
background:rgba(20,25,40,0.6);
border:1px solid #1b2a44;
border-radius:16px;
padding:20px;
margin:15px;
}

/* BUTTON */
.btn{
display:inline-block;
padding:12px 20px;
background:linear-gradient(135deg,#00e5ff,#0066ff);
color:black;
border-radius:12px;
text-decoration:none;
font-weight:700;
}

/* DOWNLOAD GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:15px;
padding:20px;
}

/* SEARCH */
.search{
display:flex;
gap:10px;
margin:15px;
background:#0b1020;
padding:10px;
border-radius:12px;
border:1px solid #1b2a44;
}

.search input{
flex:1;
border:none;
background:transparent;
color:white;
outline:none;
}

/* STATUS */
.online{color:#00ff99;}
.offline{color:#ff4d4d;}

</style>

</head>

<body>

<!-- LOADING -->
<div id="loader">
<div class="spinner"></div>
<p>Loading NORD SERVER...</p>
</div>

<canvas id="particles"></canvas>

<header>
<div class="logo-box">
<div class="logo-icon">N</div>
<div class="logo-text">NORD SERVER</div>
</div>
</header>

<section>

<h2>سرور</h2>

<div class="panel">
<p>IP: play.nord.ir</p>
<p>Version:📶1.18.2</p>
<p>Status: <span id="status">🔴Offline</span></p>
<a class="btn" onclick="copyIP()">کپی آیپی</a>
</div>

</section>

<!-- ABOUT -->
<section class="box">
<h2>درباره ما</h2>
<p>Nord Server یک سرور.</p>
</section>

<!-- NEWS -->
<section class="box">
<h2>اعلامیه‌ها</h2>
<p>سرور در حال ساخت است</p>
<p>سیستم دانلود فعال شد</p>
</section>

<!-- DOWNLOAD + SEARCH -->
<section>

<h2>دانلودها</h2>

<div class="search">
<span>🔍</span>
<input id="searchInput" placeholder="جستجو در فایل‌ها...">
</div>

<div class="container">

<div class="card">
<p>Resource Pack</p>
<a class="btn">Download</a>
</div>

<div class="card">
<p>FPS Booster</p>
<a class="btn">Download</a>
</div>

<div class="card">
<p>Shader Pack</p>
<a class="btn">Download</a>
</div>

</div>

</section>

<!-- SUPPORT -->
<section class="box">
<h2>پشتیبانی</h2>
<a class="btn" href="https://ble.ir/ma_shahripour">بله</a>
</section>

<script>

//////////////////////////////////////////////////
// LOADING
//////////////////////////////////////////////////
window.onload = () => {
setTimeout(()=>document.getElementById("loader").style.display="none",1200);
};

//////////////////////////////////////////////////
// COPY IP
//////////////////////////////////////////////////
function copyIP(){
navigator.clipboard.writeText("play.nord.ir");
alert("کپی شد ✔");
}

//////////////////////////////////////////////////
// REAL MINECRAFT STATUS
//////////////////////////////////////////////////
fetch("https://api.mcsrvstat.us/2/play.nord.ir")
.then(r=>r.json())
.then(data=>{
document.getElementById("status").innerText =
data.online ? "Online 🟢" : "Offline 🔴";
});

//////////////////////////////////////////////////
// SEARCH FILTER
//////////////////////////////////////////////////
const input=document.getElementById("searchInput");
const cards=document.querySelectorAll(".card");

input.addEventListener("input",()=>{
cards.forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(input.value.toLowerCase())
?"block":"none";
});
});

//////////////////////////////////////////////////
// PARTICLES
//////////////////////////////////////////////////
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let p=[];

for(let i=0;i<60;i++){
p.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

p.forEach(a=>{
a.x+=a.dx;
a.y+=a.dy;

if(a.x<0||a.x>canvas.width)a.dx*=-1;
if(a.y<0||a.y>canvas.height)a.dy*=-1;

ctx.beginPath();
ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
ctx.fillStyle="#00e5ff55";
ctx.fill();
});

requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
