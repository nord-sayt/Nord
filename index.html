<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NORD SERVER HUB</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#05070f;
color:white;
overflow:hidden;
}

/* 🌌 LOADING SCREEN */
#loader{
position:fixed;
width:100%;
height:100%;
background:#05070f;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}

.spinner{
width:60px;
height:60px;
border:4px solid #1b2a44;
border-top:4px solid #00e5ff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

/* 🌌 PARTICLES */
#particles{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

canvas{
display:block;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
position:sticky;
top:0;
background:rgba(10,15,30,0.7);
backdrop-filter:blur(15px);
border-bottom:1px solid #1b2a44;
z-index:10;
}

.logo-box{
display:flex;
align-items:center;
gap:10px;
}

.logo-icon{
width:44px;
height:44px;
border-radius:50%;
background:linear-gradient(135deg,#ff2b2b,#8b0000);
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
color:white;
box-shadow:0 0 18px #ff2b2b88;
}

.logo-text{
color:#00e5ff;
font-weight:800;
}

section{
padding:30px;
}

/* PANEL */
.panel, .box, .card{
background:rgba(20,25,40,0.6);
border:1px solid #1b2a44;
border-radius:16px;
padding:20px;
margin:20px;
}

/* BUTTON */
.btn{
display:inline-block;
padding:12px 20px;
background:linear-gradient(135deg,#00e5ff,#0066ff);
color:black;
border-radius:12px;
text-decoration:none;
font-weight:700;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00e5ff55;
}

/* STATUS */
.status{
color:#aaa;
}

.online{
color:#00ff99;
font-weight:bold;
}

.offline{
color:#ff4d4d;
font-weight:bold;
}
</style>

</head>

<body>

<!-- LOADER -->
<div id="loader">
<div class="spinner"></div>
<p>Loading NORD SERVER...</p>
</div>

<!-- PARTICLES -->
<canvas id="particles"></canvas>

<header>

<div class="logo-box">
<div class="logo-icon">N</div>
<div class="logo-text">NORD SERVER</div>
</div>

</header>

<section>

<h1>NORD SERVER</h1>

<div class="panel">

<p>IP: play.nord.ir</p>
<p>Version: 1.18.2</p>

<p class="status">Status: <span id="status">Checking...</span></p>

<a class="btn" onclick="copyIP()">Copy IP</a>

</div>

</section>

<section class="box">

<h2>Server Status</h2>
<p id="mcStatus">Checking Minecraft server...</p>

</section>

<script>

//////////////////////////////////////////////////
// ⚡ LOADING SCREEN
//////////////////////////////////////////////////
window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("loader").style.display="none";
},1200);
});

//////////////////////////////////////////////////
// 📋 COPY IP
//////////////////////////////////////////////////
function copyIP(){
navigator.clipboard.writeText("play.nord.ir");
alert("IP copied ✔");
}

//////////////////////////////////////////////////
// 🟢 MINECRAFT SERVER STATUS (simple API ping)
//////////////////////////////////////////////////
async function checkServer(){
try{
let res = await fetch("https://api.mcsrvstat.us/2/play.nord.ir");
let data = await res.json();

if(data.online){
document.getElementById("status").innerHTML="Online 🟢";
document.getElementById("mcStatus").innerHTML="Server is ONLINE 🟢";
}else{
document.getElementById("status").innerHTML="Offline 🔴";
document.getElementById("mcStatus").innerHTML="Server is OFFLINE 🔴";
}
}catch(e){
document.getElementById("status").innerHTML="Unknown";
}
}

checkServer();

//////////////////////////////////////////////////
// 🌌 PARTICLES SYSTEM
//////////////////////////////////////////////////
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(let p of particles){
p.x += p.dx;
p.y += p.dy;

if(p.x<0||p.x>canvas.width) p.dx*=-1;
if(p.y<0||p.y>canvas.height) p.dy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#00e5ff55";
ctx.fill();
}

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
