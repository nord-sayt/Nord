<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NORD SERVER</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#05070f;
color:white;
overflow-x:hidden;
}

/* glow */
body::before{
content:"";
position:fixed;
width:800px;
height:800px;
background:radial-gradient(circle,#00e5ff25,#0000 70%);
top:-200px;
left:-200px;
filter:blur(80px);
animation:move 12s infinite alternate;
}

@keyframes move{
from{transform:translate(0,0);}
to{transform:translate(200px,120px);}
}

/* header */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#0b1020;
position:sticky;
top:0;
border-bottom:1px solid #1b2a44;
}

.logo{
color:#00e5ff;
font-weight:bold;
}

/* sections */
section{
padding:30px;
}

.panel{
background:#0b1020;
padding:20px;
border-radius:12px;
border:1px solid #1b2a44;
animation:float 6s ease-in-out infinite;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

/* cards */
.card{
background:#0b1020;
padding:15px;
border-radius:12px;
border:1px solid #1b2a44;
animation:float 6s ease-in-out infinite;
}

.card:hover{
transform:translateY(-10px);
border-color:#00e5ff;
}

.btn{
display:inline-block;
padding:10px 15px;
background:#00e5ff;
color:black;
border-radius:8px;
text-decoration:none;
margin-top:10px;
}

/* search */
.search{
margin-top:15px;
width:100%;
padding:10px;
border-radius:10px;
border:none;
outline:none;
background:#070b18;
color:white;
}

/* float */
@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

/* footer */
footer{
text-align:center;
padding:15px;
color:#777;
border-top:1px solid #1b2a44;
margin-top:30px;
}
</style>

</head>

<body>

<header>
<div class="logo">⚡ NORD SERVER</div>
</header>

<section>
<h2>Server</h2>

<div class="panel">
<p>IP: play.nord.ir</p>
<p>Version: <b>1.18.2</b></p>
<p>Status: 🔴 Offline</p>
<a class="btn">Copy IP</a>
</div>
</section>

<section>
<h2>Downloads</h2>

<!-- SEARCH داخل دانلود -->
<input class="search" type="text" placeholder="Search downloads...">

<div class="container">

<div class="card">
<p>Resource Pack</p>
<a class="btn">Download</a>
</div>

<div class="card">
<p>FPS Booster</p>
<a class="btn">Download</a>
</div>

<div class="card">
<p>Shader Pack</p>
<a class="btn">Download</a>
</div>

</div>
</section>

<section>
<h2>Support</h2>

<div class="panel">
<p>Contact via Bale</p>
<a class="btn" href="https://ble.ir/ma_shahripour">Bale Support</a>
</div>

</section>

<footer>
© 2026 NORD SERVER
</footer>

</body>
</html>
