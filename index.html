<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Nord Server</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>⚡ NORD SERVER</h1>
  <nav>
    <button onclick="show('home')">خانه</button>
    <button onclick="show('login')">ورود</button>
    <button onclick="show('profile')">پروفایل</button>
    <button onclick="show('team')">تیم</button>
    <button onclick="show('owner')">اونر</button>
  </nav>
</header>

<main>

<!-- HOME -->
<section id="home">
  <h2>📢 اعلامیه‌ها</h2>
  <div id="announcements"></div>

  <h2>📡 سرور</h2>
  <p>IP: <span id="ip">Not Set</span></p>
  <p>بله: <span id="bale">Not Set</span></p>
</section>

<!-- LOGIN -->
<section id="login" class="hidden">
  <h2>ورود / ثبت نام</h2>
  <input id="user" placeholder="یوزرنیم">
  <input id="pass" type="password" placeholder="پسورد">
  <button onclick="register()">ثبت نام</button>
  <button onclick="login()">ورود</button>
</section>

<!-- PROFILE -->
<section id="profile" class="hidden">
  <h2>👤 پروفایل</h2>
  <p id="me"></p>
</section>

<!-- TEAM -->
<section id="team" class="hidden">
  <h2>👥 تیم Nord</h2>

  <div class="card">
    👑 Owner: <b>mohammadamin</b>
  </div>

  <h3>اعضای تیم (5 نفر)</h3>

  <div id="teamList"></div>
</section>

<!-- OWNER PANEL -->
<section id="owner" class="hidden">
  <h2>👑 پنل اونر</h2>

  <textarea id="annText" placeholder="اعلامیه جدید"></textarea>
  <button onclick="addAnn()">ثبت اعلامیه</button>

  <input id="ipInput" placeholder="IP سرور">
  <input id="baleInput" placeholder="آیدی کانال بله">
  <button onclick="saveSettings()">ذخیره تنظیمات</button>

  <h3>👥 تنظیم تیم (5 نفر)</h3>

  <input id="t1" placeholder="عضو 1">
  <input id="t2" placeholder="عضو 2">
  <input id="t3" placeholder="عضو 3">
  <input id="t4" placeholder="عضو 4">
  <input id="t5" placeholder="عضو 5">

  <button onclick="saveTeam()">ذخیره تیم</button>
</section>

</main>

<script src="app.js"></script>
</body>
</html>
