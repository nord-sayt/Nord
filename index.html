<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NORD SERVER HUB</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#05070f;
color:white;
overflow-x:hidden;
}

/* glow */
body::before{
content:"";
position:fixed;
width:800px;
height:800px;
background:radial-gradient(circle,#00e5ff33,#0000 70%);
top:-200px;
left:-200px;
filter:blur(80px);
animation:move 12s infinite alternate;
}

@keyframes move{
from{transform:translate(0,0);}
to{transform:translate(200px,120px);}
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
position:sticky;
top:0;
z-index:10;
background:rgba(10,15,30,0.6);
backdrop-filter:blur(14px);
border-bottom:1px solid #1b2a44;
}

/* LOGO */
.logo-box{
display:flex;
align-items:center;
gap:10px;
}

/* 🔴 NORD LOGO (جای آرم قرمز) */
.logo-icon{
width:44px;
height:44px;
border-radius:50%;
background:radial-gradient(circle,#00e5ff,#0066ff);
box-shadow:0 0 20px #00e5ff88;
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
color:black;
animation:pulse 2s infinite;
}

/* TEXT */
.logo-text{
font-weight:800;
color:#00e5ff;
letter-spacing:2px;
}

/* NAV */
nav a{
color:#aaa;
margin:0 10px;
text-decoration:none;
transition:.3s;
}

nav a:hover{
color:#00e5ff;
}

/* HERO */
.hero{
text-align:center;
padding:80px 20px 30px;
}

.hero h1{
font-size:50px;
color:#00e5ff;
text-shadow:0 0 25px #00e5ff55;
}

.panel{
margin:20px auto;
max-width:420px;
padding:25px;
border-radius:18px;
background:rgba(20,25,40,0.6);
border:1px solid #1b2a44;
animation:float 6s ease-in-out infinite;
}

/* BUTTON */
.btn{
display:inline-block;
margin-top:12px;
padding:12px 20px;
background:linear-gradient(135deg,#00e5ff,#0066ff);
color:black;
font-weight:700;
border-radius:12px;
text-decoration:none;
transition:.3s;
}

.btn:hover{
transform:translateY(-6px) scale(1.05);
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:30px;
}

/* CARD */
.card{
background:rgba(20,25,40,0.6);
border:1px solid #1b2a44;
border-radius:16px;
padding:20px;
animation:float 6s ease-in-out infinite;
transition:.3s;
}

.card:hover{
transform:translateY(-12px) scale(1.03);
border-color:#00e5ff;
}

/* BOX */
.box{
margin:40px;
padding:25px;
background:rgba(20,25,40,0.6);
border-radius:16px;
border:1px solid #1b2a44;
text-align:center;
}

/* FLOAT */
@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.15);}
100%{transform:scale(1);}
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
color:#777;
border-top:1px solid #1b2a44;
margin-top:40px;
}
</style>

</head>

<body>

<header>

<div class="logo-box">

<!-- 🔥 آرم نورد (جای قرمز قبلی) -->
<div class="logo-icon"></div>

<div class="logo-text">NORD SERVER</div>

</div>

<nav>
<a href="#server">سرور</a>
<a href="#downloads">دانلود</a>
<a href="#support">پشتیبانی</a>
</nav>

</header>

<!-- HERO -->
<section class="hero">

<h1>NORD SERVER</h1>

<div class="panel">

<p>IP: <b id="ipText">play.nord.ir</b></p>
<p>Version: <b>1.18.2</b></p>
<p>Status: 🔴 Offline</p>

<a class="btn" onclick="copyIP()">📋 Copy IP</a>

</div>

</section>

<!-- DOWNLOADS -->
<section class="container" id="downloads">

<div class="card">
<h3>Resource Pack</h3>
<a class="btn">Download</a>
</div>

<div class="card">
<h3>FPS Booster</h3>
<a class="btn">Download</a>
</div>

<div class="card">
<h3>Shader Pack</h3>
<a class="btn">Download</a>
</div>

</section>

<!-- SUPPORT -->
<section class="box" id="support">

<h2>Support</h2>

<a class="btn" href="https://ble.ir/@ma_shahripour" target="_blank">
💬 پشتیبانی
</a>

</section>

<footer>
© 2026 NORD SERVER HUB
</footer>

<script>
function copyIP(){
const ip = document.getElementById("ipText").innerText;
navigator.clipboard.writeText(ip);
alert("IP کپی شد ✔");
}
</script>

</body>
</html>
