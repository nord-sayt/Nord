<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NORD</title>
<link rel="stylesheet" href="style.css">
<script defer src="app.js"></script>
</head>

<body>

<header>
<div class="logo">NORD</div>

<nav>
<a href="#home">خانه</a>
<a href="#downloads">دانلود</a>
<a href="#server">سرور</a>
<a href="#contact">ارتباط</a>
</nav>
</header>

<section class="hero" id="home">
<h1>NORD</h1>
<p>Download Center + Minecraft Server</p>
<a class="btn" href="#downloads">شروع دانلود</a>
</section>

<!-- DOWNLOAD -->
<section class="section" id="downloads">

<div class="grid">

<div class="card">

</div>

<div class="card">

<button onclick="download('Maps Pack')">دانلود</button>
</div>

<div class="card">

</div>

</div>

<!-- SERVER -->
<section class="section" id="server">
<h2>🎮 سرور ما</h2>

<div class="server-box">
<p>IP سرور:</p>
<h3 id="ip">play.nord-server.com</h3>
<button onclick="copyIP()">کپی IP</button>
</div>

</section>

<!-- CONTACT -->
<section class="section" id="contact">
<h2>📞 ارتباط</h2>

<div class="card">
<p>تلگرام: @minecraft_nord</p>
<p>پشتیبانی فعال 24/7</p>
</div>

</section>

<footer>
© 2026 NORD - All Rights Reserved
</footer>

</body>
</html>
