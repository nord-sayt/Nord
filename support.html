<section class="box" id="support">

<h2>Nord Support Center</h2>
<p>برای ارتباط سریع با پشتیبانی یا ارسال مشکل از فرم زیر استفاده کن</p>

<!-- Bale Button -->
<a class="btn" href="https://ble.ir/USERNAME" target="_blank">
💬 ورود به بله (Bale)
</a>

<hr style="margin:20px 0; border:1px solid #1b2a44;">

<!-- Ticket Form -->
<h3>ارسال تیکت سریع</h3>

<form onsubmit="sendTicket(event)">

<input type="text" id="name" placeholder="نام شما" required>
<br><br>

<input type="text" id="problem" placeholder="مشکل شما چیست؟" required>
<br><br>

<input type="email" id="contact" placeholder="ایمیل یا آی‌دی بله" required>
<br><br>

<button class="btn" type="submit">ارسال تیکت</button>

</form>

<p id="msg" style="margin-top:15px;color:#00e5ff;"></p>

</section>

<script>
function sendTicket(e){
e.preventDefault();

document.getElementById("msg").innerText =
"✔ تیکت شما ثبت شد! به زودی بررسی می‌شود.";

document.getElementById("name").value="";
document.getElementById("problem").value="";
document.getElementById("contact").value="";
}
</script>
